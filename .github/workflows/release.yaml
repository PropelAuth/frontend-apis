name: npm publish

on:
    release:
        types: [created]

permissions:
    id-token: write
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

            - run: npm ci

            - run: lerna run build

            - run: lerna publish from-package --yes
